# Eryxon Flow - Self-Hosting Deployment
#
# Quick start:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d
#
# For HTTPS with automatic SSL:
#   1. Uncomment the caddy service below
#   2. Create a Caddyfile (see docs)
#   3. Change eryxon-flow ports from "80:80" to expose: ["80"]

services:
  eryxon-flow:
    image: ghcr.io/sheetmetalconnect/eryxon-flow:latest
    container_name: eryxon-flow
    restart: unless-stopped
    ports:
      - "80:80"
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Caddy reverse proxy for automatic HTTPS (recommended for production)
  #
  # To enable:
  #   1. Uncomment the caddy service and volumes below
  #   2. Change eryxon-flow from ports: ["80:80"] to expose: ["80"]
  #   3. Create a Caddyfile with your domain:
  #        your-domain.com {
  #          reverse_proxy eryxon-flow:80
  #        }
  #
  # caddy:
  #   image: caddy:alpine
  #   container_name: caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - eryxon-flow

