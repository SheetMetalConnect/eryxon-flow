services:
  mcp-server:
    build: .
    ports:
      - "${MCP_PORT:-3001}:3001"
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=3001
      - MCP_HOST=0.0.0.0
      - MCP_BIND_PUBLIC=true
      - MCP_BEARER=${MCP_BEARER:?Set MCP_BEARER to protect the HTTP MCP endpoint}
      - MCP_ALLOWED_HOSTS=${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,[::1]}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_URL=${REDIS_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
