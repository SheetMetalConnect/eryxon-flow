<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
/* ============================================================================
   ERYXON DESIGN SYSTEM — colors_and_type.css
   ----------------------------------------------------------------------------
   The single source of truth for color, typography, spacing, radius, shadow,
   and motion tokens across all Eryxon surfaces:

     - Eryxon Flow operator (tablet, dark-mode primary, glanceable from 1m)
     - Eryxon Flow admin   (desktop, light-mode primary)
     - eryxon.eu marketing (desktop, light-mode primary)

   Drop this file in once and theme with `data-theme="dark|light"` on <html>.
   Tokens follow the shadcn/ui HSL-channels convention so they compose with
   Tailwind's color() / hsl(var(--token)) pattern.

   Naming:
     --fg / --fg-muted / --fg-subtle           foreground text scale
     --bg / --surface / --surface-2            background surface scale
     --border / --border-strong                separators
     --brand / --brand-hover                   eryxon blue
     --status-* / --severity-* / --stage-*     MES domain semantics
     --space-* / --radius-* / --shadow-*       layout primitives
   ============================================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

/* ---------- DARK (default — shop-floor operator) -------------------------- */
:root,
:root[data-theme="dark"] {
  /* Brand ------------------------------------------------------------------ */
  --brand:                 211 100% 56%;   /* #1e90ff  dodger blue */
  --brand-hover:           211 100% 48%;
  --brand-strong:          211 100% 64%;   /* lighter, for links on dark */
  --brand-foreground:        0   0% 100%;
  --brand-tint:            211 100% 56% / 0.12; /* used for soft fills */

  /* Background scale ------------------------------------------------------- */
  --bg:                      0   0%  4%;   /* #0a0a0a  app background */
  --surface:                 0   0%  8%;   /* #141414  card */
  --surface-2:               0   0% 12%;   /* #1f1f1f  popover / elevated */
  --surface-hover:           0   0% 16%;

  /* Foreground scale ------------------------------------------------------- */
  --fg:                      0   0% 92%;   /* primary text */
  --fg-muted:                0   0% 65%;   /* secondary text */
  --fg-subtle:               0   0% 45%;   /* tertiary / placeholder */
  --fg-on-brand:             0   0% 100%;

  /* Borders ---------------------------------------------------------------- */
  --border:                  0   0% 22%;   /* default divider */
  --border-strong:           0   0% 32%;
  --border-subtle:           0   0% 100% / 0.06;

  /* Focus / ring ----------------------------------------------------------- */
  --ring:                  211 100% 56%;

  /* Inputs ----------------------------------------------------------------- */
  --input-bg:                0   0% 11%;
  --input-border:            0   0% 24%;

  /* MES status (work order) ------------------------------------------------ */
  --status-active:          45 100% 51%;   /* timing in progress  — amber */
  --status-completed:      140  60% 52%;   /* done                — green */
  --status-on-hold:         25  95% 53%;   /* paused              — orange */
  --status-blocked:          4  90% 58%;   /* blocked             — red */
  --status-pending:          0   0% 53%;   /* not started         — gray */

  /* Severity (issues / NCR) ------------------------------------------------ */
  --severity-critical:       4  90% 58%;
  --severity-high:          25  95% 53%;
  --severity-medium:        45 100% 51%;
  --severity-low:            0   0% 53%;

  /* Stage colors (production routing) ------------------------------------- */
  --stage-default:           0   0% 33%;
  --stage-cutting:         199  89% 48%;   /* cyan */
  --stage-bending:         271  91% 65%;   /* purple */
  --stage-welding:          25  95% 53%;   /* orange */
  --stage-assembly:        140  60% 52%;   /* green */
  --stage-finishing:        45 100% 51%;   /* yellow */

  /* Operator action colors (buttons on shop-floor) ------------------------ */
  --op-start:              140  60% 52%;   /* green   — start work */
  --op-pause:               25  95% 53%;   /* orange  — pause */
  --op-resume:              45 100% 51%;   /* yellow  — resume */
  --op-complete:           211 100% 56%;   /* blue    — complete */
  --op-issue:                4  90% 58%;   /* red     — report issue */

  /* Semantic feedback ------------------------------------------------------ */
  --success:               140  60% 52%;
  --warning:                45 100% 51%;
  --danger:                  4  90% 58%;
  --info:                  199  89% 48%;

  /* Alert tinted backgrounds (with low-opacity fill) ---------------------- */
  --alert-info-bg:         199  89% 48% / 0.10;
  --alert-info-border:     199  89% 48% / 0.25;
  --alert-success-bg:      140  60% 52% / 0.10;
  --alert-success-border:  140  60% 52% / 0.25;
  --alert-warning-bg:       45 100% 51% / 0.10;
  --alert-warning-border:   45 100% 51% / 0.25;
  --alert-danger-bg:         4  90% 58% / 0.10;
  --alert-danger-border:     4  90% 58% / 0.25;

  /* Shadow ----------------------------------------------------------------- */
  --shadow-sm:  0 1px 2px 0 rgba(0,0,0,.4);
  --shadow:     0 1px 3px 0 rgba(0,0,0,.5), 0 1px 2px -1px rgba(0,0,0,.5);
  --shadow-md:  0 4px 6px -1px rgba(0,0,0,.55), 0 2px 4px -2px rgba(0,0,0,.55);
  --shadow-lg:  0 10px 15px -3px rgba(0,0,0,.55), 0 4px 6px -4px rgba(0,0,0,.55);
  --shadow-xl:  0 20px 25px -5px rgba(0,0,0,.6), 0 8px 10px -6px rgba(0,0,0,.6);
}

/* ---------- LIGHT (admin + marketing) ------------------------------------ */
:root[data-theme="light"] {
  /* Brand ------------------------------------------------------------------ */
  --brand:                 211 100% 38%;   /* #0066cc  deeper for AA contrast */
  --brand-hover:           211 100% 32%;
  --brand-strong:          211 100% 38%;
  --brand-foreground:        0   0% 100%;
  --brand-tint:            211 100% 38% / 0.10;

  /* Background scale ------------------------------------------------------- */
  --bg:                      0   0% 100%;  /* #ffffff */
  --surface:                 0   0% 100%;  /* cards sit on bg, use border to separate */
  --surface-2:               0   0%  98%;  /* subtle hover / nested */
  --surface-hover:           0   0%  96%;

  /* Foreground scale ------------------------------------------------------- */
  --fg:                      0   0% 10%;   /* #1a1a1a */
  --fg-muted:                0   0% 35%;
  --fg-subtle:               0   0% 55%;
  --fg-on-brand:             0   0% 100%;

  /* Borders ---------------------------------------------------------------- */
  --border:                  0   0% 90%;   /* #e5e5e5 */
  --border-strong:           0   0% 80%;
  --border-subtle:           0   0%  0% / 0.06;

  /* Focus / ring ----------------------------------------------------------- */
  --ring:                  211 100% 45%;

  /* Inputs ----------------------------------------------------------------- */
  --input-bg:                0   0% 100%;
  --input-border:            0   0% 84%;

  /* MES status — deeper saturation for light backgrounds ----------------- */
  --status-active:          38  95% 43%;
  --status-completed:      140  60% 35%;
  --status-on-hold:         25  90% 48%;
  --status-blocked:          4  75% 47%;
  --status-pending:          0   0% 45%;

  --severity-critical:       4  75% 47%;
  --severity-high:          25  90% 48%;
  --severity-medium:        38  95% 43%;
  --severity-low:            0   0% 45%;

  --stage-default:           0   0% 65%;
  --stage-cutting:         199  80% 40%;
  --stage-bending:         271  75% 55%;
  --stage-welding:          25  90% 48%;
  --stage-assembly:        140  60% 35%;
  --stage-finishing:        38  95% 43%;

  --op-start:              140  60% 35%;
  --op-pause:               25  90% 48%;
  --op-resume:              38  95% 43%;
  --op-complete:           211 100% 38%;
  --op-issue:                4  75% 47%;

  --success:               140  60% 35%;
  --warning:                38  95% 43%;
  --danger:                  4  75% 47%;
  --info:                  199  80% 40%;

  --alert-info-bg:         199  80% 40% / 0.08;
  --alert-info-border:     199  80% 40% / 0.25;
  --alert-success-bg:      140  60% 35% / 0.08;
  --alert-success-border:  140  60% 35% / 0.25;
  --alert-warning-bg:       38  95% 43% / 0.10;
  --alert-warning-border:   38  95% 43% / 0.30;
  --alert-danger-bg:         4  75% 47% / 0.08;
  --alert-danger-border:     4  75% 47% / 0.25;

  --shadow-sm:  0 1px 2px 0 rgba(15,23,42,.05);
  --shadow:     0 1px 3px 0 rgba(15,23,42,.08), 0 1px 2px -1px rgba(15,23,42,.06);
  --shadow-md:  0 4px 6px -1px rgba(15,23,42,.08), 0 2px 4px -2px rgba(15,23,42,.06);
  --shadow-lg:  0 10px 15px -3px rgba(15,23,42,.10), 0 4px 6px -4px rgba(15,23,42,.06);
  --shadow-xl:  0 20px 25px -5px rgba(15,23,42,.12), 0 8px 10px -6px rgba(15,23,42,.08);
}

/* ============================================================================
   TYPOGRAPHY
   ============================================================================ */

:root {
  /* Font stacks ------------------------------------------------------------ */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
               'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Monaco, 'Cascadia Code',
               'Roboto Mono', Consolas, 'Courier New', monospace;

  /* Type scale (Major Second 1.125 — calm, utilitarian) ------------------ */
  --text-xs:    0.75rem;   /* 12 — meta, fine print only             */
  --text-sm:    0.875rem;  /* 14 — table body, captions              */
  --text-base:  1rem;      /* 16 — paragraph default                 */
  --text-lg:    1.125rem;  /* 18 — emphasised body / form labels lg  */
  --text-xl:    1.25rem;   /* 20 — card titles                       */
  --text-2xl:   1.5rem;    /* 24 — section headings (h3)             */
  --text-3xl:   1.875rem;  /* 30 — page titles (h2)                  */
  --text-4xl:   2.25rem;   /* 36 — admin hero, marketing h1 sm       */
  --text-5xl:   3rem;      /* 48 — marketing hero                    */
  --text-6xl:   3.75rem;   /* 60 — marketing hero (max — desktop)    */

  /* Tablet operator scale (used inside `.operator-surface`) -------------- */
  --text-op-meta:   0.875rem;   /* 14 — chips, secondary               */
  --text-op-body:   1rem;       /* 16 — operation card body            */
  --text-op-title:  1.25rem;    /* 20 — operation name                 */
  --text-op-cta:    1.125rem;   /* 18 — start/pause buttons            */
  --text-op-stat:   2rem;       /* 32 — large timing readouts          */

  /* Weights --------------------------------------------------------------- */
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;

  /* Line heights ---------------------------------------------------------- */
  --leading-tight:   1.2;
  --leading-snug:    1.35;
  --leading-normal:  1.5;
  --leading-relaxed: 1.6;

  /* Tracking -------------------------------------------------------------- */
  --tracking-tight:   -0.02em;
  --tracking-normal:   0;
  --tracking-wide:    0.04em;
  --tracking-caps:    0.06em;
}

/* ============================================================================
   SPACING, RADIUS, MOTION
   ============================================================================ */

:root {
  /* 4px base scale -------------------------------------------------------- */
  --space-1:   0.25rem;  /*  4 */
  --space-2:   0.5rem;   /*  8 */
  --space-3:   0.75rem;  /* 12 */
  --space-4:   1rem;     /* 16 */
  --space-5:   1.25rem;  /* 20 */
  --space-6:   1.5rem;   /* 24 */
  --space-8:   2rem;     /* 32 */
  --space-10:  2.5rem;   /* 40 */
  --space-12:  3rem;     /* 48 */
  --space-16:  4rem;     /* 64 */
  --space-20:  5rem;     /* 80 */
  --space-24:  6rem;     /* 96 */

  /* Radius — compact corners (matches Flow v3.2) ------------------------- */
  --radius-sm:   0.25rem;  /*  4  chips, small buttons */
  --radius:      0.375rem; /*  6  default              */
  --radius-md:   0.5rem;   /*  8  inputs               */
  --radius-lg:   0.625rem; /* 10                      */
  --radius-xl:   0.75rem;  /* 12  cards                */
  --radius-2xl:  1rem;     /* 16                      */
  --radius-full: 9999px;

  /* Touch targets — operator tablet floors -------------------------------- */
  --touch-min:         44px;   /* WCAG AA / Apple HIG  */
  --touch-comfortable: 56px;   /* Eryxon operator default */

  /* Motion ---------------------------------------------------------------- */
  --duration-fast:   120ms;
  --duration-base:   180ms;
  --duration-slow:   260ms;
  --ease:            cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out:        cubic-bezier(0,   0, 0.2, 1);
  --ease-in:         cubic-bezier(0.4, 0,   1, 1);
}

/* ============================================================================
   BASE / SEMANTIC ELEMENT STYLES
   ============================================================================ */

html {
  font-family: var(--font-sans);
  font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  color-scheme: dark;
  background: hsl(var(--bg));
  color: hsl(var(--fg));
}

html[data-theme="light"] { color-scheme: light; }

body {
  margin: 0;
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  background: hsl(var(--bg));
  color: hsl(var(--fg));
}

h1, .h1 {
  font-size: var(--text-4xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
  margin: 0;
}
h2, .h2 {
  font-size: var(--text-3xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
  margin: 0;
}
h3, .h3 {
  font-size: var(--text-2xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-snug);
  margin: 0;
}
h4, .h4 {
  font-size: var(--text-xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-snug);
  margin: 0;
}
h5, .h5 {
  font-size: var(--text-lg);
  font-weight: var(--weight-semibold);
  margin: 0;
}
h6, .h6 {
  font-size: var(--text-base);
  font-weight: var(--weight-semibold);
  margin: 0;
}

p { margin: 0; }

small, .text-meta {
  font-size: var(--text-xs);
  color: hsl(var(--fg-muted));
}

a {
  color: hsl(var(--brand-strong));
  text-decoration: none;
  transition: color var(--duration-base) var(--ease);
}
a:hover { text-decoration: underline; text-underline-offset: 3px; }

code, kbd, samp, pre {
  font-family: var(--font-mono);
  font-size: 0.92em;
}
code:not(pre code) {
  padding: 0.1em 0.35em;
  background: hsl(var(--surface-2));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius-sm);
}

/* Focus — always 2px solid brand ring, never glow ------------------------ */
:focus-visible {
  outline: 2px solid hsl(var(--ring));
  outline-offset: 2px;
  border-radius: var(--radius);
}

::selection {
  background: hsl(var(--brand) / 0.3);
  color: hsl(var(--fg));
}

/* ============================================================================
   OPERATOR SURFACE — tablet shop-floor screens
   Add `class="operator-surface"` to the root of any operator screen. Bumps the
   touch target floor, base font size, and button comfort.
   ============================================================================ */
.operator-surface {
  font-size: var(--text-op-body);
}
.operator-surface button,
.operator-surface [role="button"] {
  min-height: var(--touch-comfortable);
}


html,body { background: hsl(var(--bg)); }
body { padding: 20px; font-family: var(--font-sans); color: hsl(var(--fg)); }
.row { display:flex; gap: var(--space-3); align-items:center; flex-wrap:wrap; }
.col { display:flex; flex-direction:column; gap: var(--space-2); }
.label { font-size: var(--text-xs); color: hsl(var(--fg-muted)); letter-spacing: var(--tracking-caps); text-transform: uppercase; font-weight: var(--weight-medium); }
.kbd { font-family: var(--font-mono); font-size: 11px; color: hsl(var(--fg-subtle)); }

/* ---------- BUTTONS (shadcn-shaped, Eryxon-tokenised) ---------- */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  height:40px; padding:0 16px;
  border-radius: var(--radius-md);
  font: var(--weight-medium) 14px/1 var(--font-sans);
  border:1px solid transparent;
  cursor:pointer;
  transition: background var(--duration-base) var(--ease), border-color var(--duration-base) var(--ease), color var(--duration-base) var(--ease);
  white-space:nowrap;
}
.btn-primary { background: hsl(var(--brand)); color: hsl(var(--brand-foreground)); }
.btn-primary:hover { background: hsl(var(--brand-hover)); }
.btn-secondary { background: hsl(var(--surface-2)); color: hsl(var(--fg)); border-color: hsl(var(--border)); }
.btn-secondary:hover { background: hsl(var(--surface-hover)); }
.btn-outline { background: transparent; color: hsl(var(--fg)); border-color: hsl(var(--border-strong)); }
.btn-outline:hover { background: hsl(var(--surface-2)); }
.btn-ghost { background: transparent; color: hsl(var(--fg)); }
.btn-ghost:hover { background: hsl(var(--surface-hover)); }
.btn-destructive { background: hsl(var(--danger)); color: #fff; }
.btn-destructive:hover { filter:brightness(0.92); }
.btn-sm { height:32px; padding:0 12px; font-size:13px; }
.btn-lg { height:48px; padding:0 24px; font-size:15px; }

/* operator action buttons — large, single-color */
.op-btn {
  display:inline-flex; align-items:center; justify-content:center; gap:10px;
  height:64px; padding:0 28px;
  border-radius: var(--radius-md);
  font: var(--weight-semibold) 17px/1 var(--font-sans);
  border:none; color:#fff;
  cursor:pointer;
}
.op-start { background: hsl(var(--op-start)); }
.op-pause { background: hsl(var(--op-pause)); }
.op-complete { background: hsl(var(--op-complete)); }
.op-issue   { background: hsl(var(--op-issue)); }

/* ---------- BADGES ---------- */
.badge {
  display:inline-flex; align-items:center; gap:6px;
  padding: 2px 10px; border-radius: var(--radius-full);
  font: var(--weight-semibold) 11px/1.6 var(--font-sans);
  letter-spacing: var(--tracking-wide);
}
.badge.solid-primary { background: hsl(var(--brand)); color: #fff; }
.badge.solid-neutral { background: hsl(var(--surface-2)); color: hsl(var(--fg)); border:1px solid hsl(var(--border)); }
.badge.solid-success { background: hsl(var(--success)); color:#0a0a0a; }
.badge.outline { background: transparent; color: hsl(var(--fg)); border:1px solid hsl(var(--border)); }

.chip {
  display:inline-flex; align-items:center; gap:6px;
  padding: 4px 10px; border-radius: var(--radius-full);
  font: var(--weight-medium) 12px/1.4 var(--font-sans);
}
.chip-dot { width:8px; height:8px; border-radius:50%; }

/* ---------- INPUTS ---------- */
.input {
  width:100%; height:40px;
  border-radius: var(--radius-md);
  border:1px solid hsl(var(--input-border));
  background: hsl(var(--input-bg));
  color: hsl(var(--fg));
  padding: 0 12px;
  font: 14px/1 var(--font-sans);
  box-sizing:border-box;
}
.input::placeholder { color: hsl(var(--fg-subtle)); }
.input:focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 1px; border-color: hsl(var(--ring)); }
.field-label { font-size: 13px; font-weight: var(--weight-medium); color: hsl(var(--fg)); margin-bottom: 6px; display:block; }
.helper { font-size: 12px; color: hsl(var(--fg-muted)); margin-top: 6px; }

/* ---------- CARDS ---------- */
.dscard {
  background: hsl(var(--surface));
  border:1px solid hsl(var(--border));
  border-radius: var(--radius-xl);
  padding: 16px;
}

/* ---------- ALERTS ---------- */
.alert { display:flex; gap:10px; padding:10px 14px; border-radius: var(--radius-md); font-size:13px; line-height:1.5; align-items:flex-start; }
.alert .ic { font-family: var(--font-mono); font-weight:700; font-size:13px; line-height:1.6; }
.alert-info    { background:hsl(var(--alert-info-bg));    border:1px solid hsl(var(--alert-info-border));    color: hsl(var(--info)); }
.alert-success { background:hsl(var(--alert-success-bg)); border:1px solid hsl(var(--alert-success-border)); color: hsl(var(--success)); }
.alert-warning { background:hsl(var(--alert-warning-bg)); border:1px solid hsl(var(--alert-warning-border)); color: hsl(var(--warning)); }
.alert-danger  { background:hsl(var(--alert-danger-bg));  border:1px solid hsl(var(--alert-danger-border));  color: hsl(var(--danger)); }
.alert b { color: hsl(var(--fg)); font-weight: var(--weight-semibold); }
.alert .body { color: hsl(var(--fg)); font-weight: var(--weight-regular); }

/* ---------- OPERATION CARD (the MES atom) ---------- */
.op-card {
  display:flex; overflow:hidden; border-radius: var(--radius-md);
  border:1px solid hsl(var(--border));
  background: hsl(var(--surface));
  text-align:left; cursor:pointer; transition: var(--duration-base);
  min-width: 320px;
}
.op-card:hover { border-color: hsl(var(--brand) / 0.4); }
.op-stripe { width:4px; background: hsl(var(--status-active)); }
.op-body { flex:1; padding: 10px 14px; min-width:0; }
.op-row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
.op-job { font-family: var(--font-mono); font-size:11px; color: hsl(var(--fg-muted)); }
.op-title { font-size:14px; font-weight:600; margin-top:2px; }
.op-meta { font-size:11px; color: hsl(var(--fg-muted)); margin-top:2px; }
.op-due { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing: var(--tracking-wide); padding:2px 6px; border-radius:3px; }
.due-overdue { background: hsl(var(--danger) / 0.15); color: hsl(var(--danger)); }
.due-today   { background: hsl(var(--warning) / 0.15); color: hsl(var(--warning)); }
.due-soon    { background: hsl(var(--status-on-hold) / 0.15); color: hsl(var(--status-on-hold)); }

/* small icon */
.ic-svg { width:14px; height:14px; stroke-width:1.5; stroke:currentColor; fill:none; flex-shrink:0; vertical-align:middle; }
</style>
</head>
<body>
  <div class="operator-surface col" style="gap:14px">
    <div class="label">Operator actions — 64 px tall, single-purpose</div>
    <div class="row" style="gap:10px">
      <button class="op-btn op-start">▶ Start</button>
      <button class="op-btn op-pause">⏸ Pause</button>
      <button class="op-btn op-complete">✓ Complete</button>
      <button class="op-btn op-issue">! Issue</button>
    </div>
    <div class="kbd" style="font-size:11px">Color is the affordance — each action has its own dedicated hue. Touch target = 64 px.</div>
  </div>
</body>
</html>
