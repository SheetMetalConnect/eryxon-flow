# Security headers — re-included in each location that defines add_header,
# because nginx does not inherit add_header from outer scopes once an inner
# scope sets any add_header (see ngx_http_headers_module docs).
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
