name: Release

# Manual trigger for controlled releases.
#
# Production release execution must declare its intent under the biweekly
# release-train rule. See:
#   docs/2026-05-24-ery-88-release-cadence-repo-hygiene-and-trial-telemetry.md
# Scheduled train is the default path; off-cycle production work is a
# critical-hotfix exception only.
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release path under the ERY-88 cadence rule'
        required: true
        default: 'scheduled-train'
        type: choice
        options:
          - scheduled-train
          - critical-hotfix
      train_date:
        description: 'Scheduled train date YYYY-MM-DD (required for scheduled-train)'
        required: false
        default: ''
        type: string
      hotfix_reference:
        description: 'Sanitized incident/issue reference, e.g. ERY-### (required for critical-hotfix)'
        required: false
        default: ''
        type: string
      run_migrations:
        description: 'Run database migrations'
        required: true
        default: 'false'
        type: boolean
      deploy_functions:
        description: 'Deploy Edge Functions'
        required: true
        default: 'true'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Step 0: Enforce the release-train / hotfix declaration before anything runs.
  # This gate makes train-vs-hotfix intent explicit and auditable in the run log.
  # Cadence rule: docs/2026-05-24-ery-88-release-cadence-repo-hygiene-and-trial-telemetry.md
  declare:
    name: 0. Declare Release Path
    runs-on: ubuntu-latest
    steps:
      - name: Validate declaration
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          TRAIN_DATE: ${{ inputs.train_date }}
          HOTFIX_REFERENCE: ${{ inputs.hotfix_reference }}
        run: |
          set -euo pipefail
          fail() { echo "::error::$1"; exit 1; }

          case "$RELEASE_TYPE" in
            scheduled-train)
              [ -n "$TRAIN_DATE" ] || fail "scheduled-train requires a train_date (YYYY-MM-DD)."
              echo "$TRAIN_DATE" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
                || fail "train_date must be YYYY-MM-DD, got: $TRAIN_DATE"
              if [ -n "$HOTFIX_REFERENCE" ]; then
                fail "Pick one path: hotfix_reference must be empty for a scheduled-train release."
              fi
              SUMMARY="Scheduled train — **$TRAIN_DATE**"
              ;;
            critical-hotfix)
              [ -n "$HOTFIX_REFERENCE" ] || fail "critical-hotfix requires a hotfix_reference (sanitized incident/issue id)."
              if [ -n "$TRAIN_DATE" ]; then
                fail "Pick one path: train_date must be empty for a critical-hotfix release."
              fi
              SUMMARY="Critical hotfix — **$HOTFIX_REFERENCE**"
              ;;
            *)
              fail "Unknown release_type: $RELEASE_TYPE"
              ;;
          esac

          {
            echo "## Release path declaration"
            echo ""
            echo "- Path: $SUMMARY"
            echo "- Triggered by: @${{ github.actor }}"
            echo ""
            echo "Cadence rule: \`docs/2026-05-24-ery-88-release-cadence-repo-hygiene-and-trial-telemetry.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Release path OK: $RELEASE_TYPE"

  # Step 1: Run all tests
  test:
    name: 1. Run Tests
    runs-on: ubuntu-latest
    needs: declare
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (verify)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PROD }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_PROD }}

      - name: Run tests
        run: npm run test:run

  # Step 2: Run migrations (if enabled, requires approval)
  migrate:
    name: 2. Run Migrations
    runs-on: ubuntu-latest
    needs: test
    if: ${{ inputs.run_migrations == true }}
    environment: production  # Requires manual approval
    steps:
      - uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF_PROD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # Step 3: Deploy Edge Functions (if enabled)
  deploy-functions:
    name: 3. Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [test, migrate]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
      inputs.deploy_functions == true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF_PROD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # Step 4: Build and push Docker image
  build-and-push:
    name: 4. Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, migrate, deploy-functions]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
      (needs.deploy-functions.result == 'success' || needs.deploy-functions.result == 'skipped')
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      image_name: ${{ steps.repo.outputs.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Repository name to lowercase
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:${{ steps.version.outputs.VERSION }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL_PROD }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY_PROD }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Step 5: Deploy to Hetzner via SSH
  deploy:
    name: 5. Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.result == 'success'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/eryxon-flow
            
            # Pull new image
            docker compose pull
            
            # Restart services
            docker compose up -d --remove-orphans
            
            # Cleanup old images
            docker image prune -f


  # Step 6: Create GitHub release
  create-release:
    name: 6. Create Release
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: needs.build-and-push.result == 'success' && needs.deploy.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build-and-push.outputs.version }}
          generate_release_notes: true
          body: |
            ## Release v${{ needs.build-and-push.outputs.version }}

            **Release path (ERY-88 cadence):**
            - Type: ${{ inputs.release_type }}
            - Scheduled train date: ${{ inputs.train_date }}
            - Hotfix reference: ${{ inputs.hotfix_reference }}

            **What was deployed:**
            - Migrations: ${{ inputs.run_migrations }}
            - Edge Functions: ${{ inputs.deploy_functions }}

            **Docker Image:**
            ```
            docker pull ghcr.io/${{ needs.build-and-push.outputs.image_name }}:${{ needs.build-and-push.outputs.version }}
            ```
