name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

  # Apply DB migrations to prod BEFORE the frontend deploys, so the schema
  # always leads the UI. This closes the gap that caused merged migrations to
  # never reach prod (the UI shipped, the DB didn't). Runs only on push to
  # main / manual dispatch — never on PRs. Skips gracefully when Supabase
  # secrets are absent (forks, self-hosted) so it doesn't paint builds red.
  # The migration history was reconciled with the repo files, so `db push`
  # only applies genuinely-new migrations.
  migrate:
    name: Apply DB Migrations
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF_PROD: ${{ secrets.SUPABASE_PROJECT_REF_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Supabase credentials
        id: sb-creds
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_REF_PROD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Supabase secrets not configured — skipping migrations."
          fi

      - name: Setup Supabase CLI
        if: steps.sb-creds.outputs.available == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link to production project
        if: steps.sb-creds.outputs.available == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF_PROD"

      - name: Push migrations
        if: steps.sb-creds.outputs.available == 'true'
        run: supabase db push --linked

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [test, migrate]
    # Build on PRs (migrate is skipped there) and deploy on push after
    # migrations succeed. always() lets deploy run when migrate is skipped.
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # Skip (instead of fail) while the Cloudflare deploy credentials are not
      # configured, so missing repo secrets don't paint every PR red. The
      # build above still validates the bundle either way.
      - name: Check deploy credentials
        id: cf-creds
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN not configured — skipping Pages deploy."
          fi

      # wrangler-action@v3 replaces the deprecated pages-action@v1 (Node 20
      # actions are removed from runners 2026-09; forced to Node 24 from
      # 2026-06-16).
      - name: Deploy to Cloudflare Pages
        if: steps.cf-creds.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=eryxon-flow
