name: Native Build Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/native-build-smoke.yml
      - android/**
      - capacitor.config.ts
      - package.json
      - package-lock.json
      - public/**
      - scripts/ios-init.sh
      - src/native/**
      - src/pages/mobile/**
      - src/styles/mobile.css
      - src/styles/mobile-ios.css

# iOS and Android run as independent jobs so an iOS failure no longer skips
# Android validation (and vice-versa) — each lane reports its own status.
jobs:
  ios-smoke:
    name: iOS bootstrap + simulator build
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Capture iOS toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "Node $(node -v)"
            echo "npm $(npm -v)"
            xcodebuild -version
            echo "CocoaPods $(pod --version)"
          } 2>&1 | tee artifacts/ios-toolchain.log

      - name: Bootstrap iOS workspace
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npm run ios:init 2>&1 | tee artifacts/ios-init.log

      - name: Assert iOS deployment-target floor
        shell: bash
        run: |
          set -euo pipefail
          # GoogleMLKit/BarcodeScanning (= 7.0.0) needs iOS 15.5+. Fail loudly if
          # ios:init did not raise the Podfile floor before pods resolved.
          grep -q "platform :ios, '15.5'" ios/App/Podfile

      - name: Build iOS simulator target
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ios/App/build \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee artifacts/ios-build.log | xcbeautify

      - name: Upload iOS smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-smoke-ios-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            artifacts/*.log
            ios/App/Podfile
            ios/App/build/**

  android-smoke:
    name: Android debug + release assemble
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Capture Android toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "Node $(node -v)"
            echo "npm $(npm -v)"
            java -version
            echo "ANDROID_HOME=${ANDROID_HOME:-unset}"
            ls "$ANDROID_HOME/platforms" | grep "android-35"
            ls "$ANDROID_HOME/build-tools" | grep "35.0"
          } 2>&1 | tee artifacts/android-toolchain.log

      - name: Install JS dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Repair darwin-arm64 native bindings
        shell: bash
        run: |
          set -euo pipefail
          # macos runners are Apple Silicon; npm ci skips Rollup/SWC arm64
          # bindings (npm optional-deps bug), which breaks `npm run build`.
          bash scripts/repair-native-bindings.sh

      - name: Assemble Android debug APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npm run android:assemble:debug 2>&1 | tee artifacts/android-debug.log

      - name: Assemble Android release APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npm run android:assemble:release 2>&1 | tee artifacts/android-release.log

      - name: Upload Android smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-smoke-android-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            artifacts/*.log
            android/app/build/outputs/**
