name: Seed Provisioning Drill

# Fresh-provisioning seed drills for ERY-101 / ERY-107.
#
# Two complementary jobs, both proving the ERY-83 seed fix (commit b2ba76a,
# "tolerate insufficient_privilege on storage policies") makes supabase/seed.sql
# deterministic on a fresh tenant. Both are local/ephemeral to the runner and
# NEVER touch production or any shared Supabase environment.
#
#   1. seed-drill — non-owner-role drill with a self-validating negative control.
#      Runs seed.sql as a deliberately non-owner login role against a fresh stack,
#      reproducing the hosted non-owner privilege boundary that raised
#      `42501 insufficient_privilege` in the ERY-47 drill. The job is
#      self-validating:
#        * NEGATIVE — the PRE-FIX seed.sql (parent of b2ba76a) MUST abort with 42501.
#        * POSITIVE — the current (fixed) seed.sql MUST complete clean.
#      If the negative control does not reproduce 42501, the harness is not
#      exercising the bug and the run fails loudly rather than giving a false pass.
#
#   2. seed-provisioning-drill — ERY-107 fresh-provisioning re-drill. Runs the
#      canonical `supabase db reset` seed path on a Docker-capable runner and
#      asserts the seed phase no longer fails with 42501 / "must be owner of
#      table objects".

on:
  workflow_dispatch:
  push:
    branches:
      - "engineer/**"
    paths:
      - .github/workflows/seed-provisioning-drill.yml
      - supabase/seed.sql
      - supabase/migrations/**
      - supabase/config.toml

jobs:
  seed-drill:
    name: Fresh-tenant seed phase (non-owner role)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need history to fetch the pre-fix seed.sql

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.72.7

      - name: Capture toolchain + commit context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "supabase $(supabase --version)"
            echo "docker $(docker --version)"
            echo "HEAD $(git rev-parse HEAD)"
            echo "seed fix commit (b2ba76a) present: $(git merge-base --is-ancestor b2ba76a HEAD && echo yes || echo no)"
          } 2>&1 | tee artifacts/toolchain.log

      - name: Start fresh Supabase stack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Fresh stack: applies migrations (storage policies created by the
          # owner-run 20260127230000_post_schema_setup migration) and runs the
          # current seed once as the superuser path.
          supabase start 2>&1 | tee artifacts/supabase-start.log

      - name: Resolve local DB connection
        id: db
        shell: bash
        run: |
          set -euo pipefail
          DB_URL="$(supabase status -o env | sed -n 's/^DB_URL="\{0,1\}\([^"]*\)"\{0,1\}$/\1/p')"
          if [ -z "$DB_URL" ]; then
            DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          fi
          echo "Resolved DB_URL host/port (redacted creds): ${DB_URL#*@}"
          echo "db_url=$DB_URL" >> "$GITHUB_OUTPUT"

      - name: Verify seed role is a non-owner (fidelity guard)
        shell: bash
        env:
          DB_URL: ${{ steps.db.outputs.db_url }}
        run: |
          set -euo pipefail
          # The runbook applies seed via `supabase db execute < seed.sql`, which
          # connects as `postgres`. On both hosted Supabase and this local stack,
          # `postgres` is a non-superuser that does NOT own storage.objects (owned
          # by supabase_storage_admin) — so CREATE POLICY raises 42501. We assert
          # that here so a future stack change that makes postgres an owner/super
          # would surface as a fidelity failure rather than a silent false pass.
          psql "$DB_URL" -v ON_ERROR_STOP=1 <<'SQL' 2>&1 | tee artifacts/role-check.log
          SELECT current_user AS seed_role,
                 (SELECT rolsuper FROM pg_roles WHERE rolname = current_user) AS is_superuser,
                 pg_catalog.pg_get_userbyid(c.relowner) AS storage_objects_owner
          FROM pg_class c
          JOIN pg_namespace n ON n.oid = c.relnamespace
          WHERE n.nspname = 'storage' AND c.relname = 'objects';
          DO $$
          DECLARE v_super boolean; v_owner text;
          BEGIN
            SELECT rolsuper INTO v_super FROM pg_roles WHERE rolname = current_user;
            SELECT pg_get_userbyid(c.relowner) INTO v_owner
              FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
              WHERE n.nspname='storage' AND c.relname='objects';
            IF v_super THEN RAISE EXCEPTION 'FIDELITY: seed role % is a superuser; 42501 will not reproduce', current_user; END IF;
            IF v_owner = current_user THEN RAISE EXCEPTION 'FIDELITY: seed role % owns storage.objects; 42501 will not reproduce', current_user; END IF;
          END $$;
          SQL

      - name: NEGATIVE control — pre-fix seed MUST fail with 42501
        shell: bash
        env:
          SEED_URL: ${{ steps.db.outputs.db_url }}
        run: |
          set -uo pipefail
          mkdir -p artifacts
          # Fetch the seed.sql exactly as it was before the fix (parent of b2ba76a).
          git show b2ba76a~1:supabase/seed.sql > artifacts/seed.prefix.sql
          set +e
          # VERBOSITY=verbose makes psql print the SQLSTATE (42501) alongside the
          # human-readable "must be owner of table" message.
          psql "$SEED_URL" -v ON_ERROR_STOP=1 -v VERBOSITY=verbose -f artifacts/seed.prefix.sql \
            > artifacts/negative-control.out 2> artifacts/negative-control.err
          RC=$?
          set -e
          echo "pre-fix seed exit code: $RC"
          cat artifacts/negative-control.err || true
          if [ "$RC" -eq 0 ]; then
            echo "::error::Negative control did not fail — harness is NOT reproducing the 42501 non-owner condition. Drill result is untrustworthy."
            exit 1
          fi
          # 42501 surfaces as SQLSTATE 42501 / "insufficient_privilege" / the
          # message "must be owner of table objects" — all the same privilege error.
          if ! grep -qiE "42501|insufficient_privilege|must be owner of table objects" artifacts/negative-control.err; then
            echo "::error::Pre-fix seed failed, but not with the 42501 ownership error — wrong failure mode."
            exit 1
          fi
          echo "OK: pre-fix seed aborted with 42501 as expected (harness reproduces the bug)."

      - name: POSITIVE — current fixed seed MUST complete clean
        shell: bash
        env:
          SEED_URL: ${{ steps.db.outputs.db_url }}
        run: |
          set -uo pipefail
          mkdir -p artifacts
          set +e
          psql "$SEED_URL" -v ON_ERROR_STOP=1 -v VERBOSITY=verbose -f supabase/seed.sql \
            > artifacts/positive-seed.out 2> artifacts/positive-seed.err
          RC=$?
          set -e
          echo "fixed seed exit code: $RC"
          echo "----- stdout -----"; cat artifacts/positive-seed.out || true
          echo "----- stderr -----"; cat artifacts/positive-seed.err || true
          if [ "$RC" -ne 0 ]; then
            echo "::error::Fixed seed.sql did NOT complete clean (exit $RC) — seed fix insufficient."
            exit 1
          fi
          # With the fix, the privilege error is swallowed by the exception handler,
          # so no ERROR line should reach stderr at all.
          if grep -qiE "^psql:.*ERROR:|42501|must be owner of table objects" artifacts/positive-seed.err; then
            echo "::error::Fixed seed.sql surfaced an unhandled privilege error."
            exit 1
          fi
          echo "OK: fixed seed.sql completed clean on a fresh tenant as a non-owner role (no 42501 abort)."

      - name: Drill result summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Seed Provisioning Drill — ERY-101 / ERY-107 (non-owner role)"
            echo
            echo "- Stack: fresh \`supabase start\` on ubuntu-latest (Docker)"
            echo "- Seed run as non-owner role \`seed_runner\` (reproduces hosted 42501 condition)"
            echo "- Negative control (pre-fix seed): expected abort with 42501"
            echo "- Positive (fixed seed): expected clean completion"
            echo "- HEAD: $(git rev-parse HEAD)"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Stop stack
        if: always()
        shell: bash
        run: supabase stop --no-backup || true

      - name: Upload drill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seed-drill-non-owner-${{ github.run_id }}
          if-no-files-found: warn
          path: artifacts/*

  seed-provisioning-drill:
    name: supabase db reset (fresh provisioning)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Capture toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "supabase $(supabase --version)"
            echo "docker $(docker --version)"
          } 2>&1 | tee artifacts/toolchain.log

      - name: Start local Supabase stack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Boot only the DB + storage services needed for the seed path.
          supabase start -x studio,inbucket,realtime,imgproxy,edge-runtime,logflare,vector,pgbouncer 2>&1 \
            | tee artifacts/supabase-start.log

      - name: Fresh provisioning reset (migrations + seed)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Canonical fresh-provisioning command referenced by ERY-101/ERY-47.
          # --debug surfaces the per-statement seed output we need as evidence.
          supabase db reset --debug 2>&1 | tee artifacts/db-reset.log

      - name: Assert seed phase has no storage-policy ownership failure
        shell: bash
        run: |
          set -euo pipefail
          log=artifacts/db-reset.log
          echo "Scanning $log for 42501 / insufficient_privilege / ownership failures..."
          # These are the exact ERY-47 failure signatures the b2ba76a fix targets.
          if grep -nE "42501|insufficient_privilege|must be owner of (table|relation) objects" "$log"; then
            echo "::error::Seed phase still hit a storage-policy privilege/ownership failure"
            exit 1
          fi
          # Reset must have actually run the seed; guard against a silently skipped seed.
          if ! grep -qiE "seed|Seeding|Applying migration|Finished supabase db reset" "$log"; then
            echo "::error::db reset log does not show a migration/seed phase — drill inconclusive"
            exit 1
          fi
          echo "PASS: seed phase completed with no 42501 / insufficient_privilege / ownership failure."

      - name: Upload drill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seed-provisioning-drill-${{ github.run_id }}
          if-no-files-found: warn
          path: artifacts/*.log
