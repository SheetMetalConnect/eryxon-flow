server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Security headers — applied at server level so locations without their
    # own add_header inherit them. Locations that define add_header MUST
    # re-include the snippet, because nginx does not merge add_header across
    # scopes (the inner scope's add_header replaces the outer scope's set).
    include /etc/nginx/conf.d/security-headers.conf;

    # Cache static assets
    location /assets/ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # PWA: service worker must never be cached so updates ship promptly.
    location = /sw.js {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # PWA: web app manifest — short cache, must revalidate.
    location = /manifest.webmanifest {
        include /etc/nginx/conf.d/security-headers.conf;
        types { } default_type "application/manifest+json";
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    # Runtime env (regenerated by docker-entrypoint on container start).
    location = /env.js {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        include /etc/nginx/conf.d/security-headers.conf;
        access_log off;
        return 200 '{"status":"ok","service":"eryxon-flow"}';
        add_header Content-Type application/json;
    }
}
